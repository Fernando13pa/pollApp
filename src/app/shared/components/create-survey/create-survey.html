<main class="create-page">
  <section class="survey-overlay" aria-labelledby="create-title">
    <header class="survey-overlay__header">
      <div>
        <span class="draft-badge">Draft</span>
        <h1 id="create-title">Create new survey</h1>
      </div>

      <a class="cancel-button" routerLink="">
        <span>Cancel</span>
        <img src="asset/close.svg" alt="" />
      </a>
    </header>

    <form class="survey-form">
      <section class="survey-form__top" aria-label="Survey information">
        <div class="survey-field survey-field--name">
          <label for="survey-name">Survey name</label>
          <div class="field-action">
            <input id="survey-name" type="text" />
            <button type="button" aria-label="Clear survey name">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>
        </div>

        <div class="survey-field survey-field--description">
          <label for="survey-description">Describing text <span>(optional)</span></label>
          <div class="field-action">
            <textarea id="survey-description" rows="5"></textarea>
            <button type="button" aria-label="Clear description">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>
        </div>

        <div class="survey-field survey-field--date">
          <label for="survey-date">Set end date <span>(optional)</span></label>
          <div class="field-action">
            <input id="survey-date" type="text" />
            <button type="button" aria-label="Clear end date">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>
        </div>

        <button class="category-button" type="button">
          <span>Choose category</span>
          <img src="asset/arrow_drop_down_white.svg" alt="" />
        </button>
      </section>

      <section class="question-grid" aria-label="Survey questions">
        <article class="question-card">
          <div class="question-title">
            <label for="question-1">1. Question</label>
            <button type="button" aria-label="Clear question 1">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>

          <input id="question-1" type="text" value="Which date would work best for you?" />

          <div class="answer-header">
            <strong>Answers</strong>
            <label class="multi-check">
              <input type="checkbox" />
              <span>Allow multiple answers.</span>
            </label>
          </div>

          <div class="answer-row">
            <label for="answer-a-1">A.</label>
            <input id="answer-a-1" type="text" />
            <button type="button" aria-label="Delete answer A">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>

          <div class="answer-row">
            <label for="answer-b-1">B.</label>
            <input id="answer-b-1" type="text" />
            <button type="button" aria-label="Delete answer B">
              <img src="asset/delete.svg" alt="" />
            </button>
          </div>

          <button class="link-action" type="button">
            <span>Add answer</span>
            <img src="asset/add_circle_white.svg" alt="" />
          </button>
        </article>

        @if (isSecondQuestionVisible()) {
          <article class="question-card">
            <div class="question-title">
              <label for="question-2">2. Question</label>
              <button type="button" aria-label="Delete question 2" (click)="hideSecondQuestion()">
                <img src="asset/delete.svg" alt="" />
              </button>
            </div>

            <input id="question-2" type="text" value="Choose the activities you prefer?" />

            <div class="answer-header">
              <strong>Answers</strong>
              <label class="multi-check">
                <input type="checkbox" />
                <span>Allow multiple answers.</span>
              </label>
            </div>

            <div class="answer-row">
              <label for="answer-a-2">A.</label>
              <input id="answer-a-2" type="text" />
              <button type="button" aria-label="Delete answer A from question 2">
                <img src="asset/delete.svg" alt="" />
              </button>
            </div>

            <div class="answer-row">
              <label for="answer-b-2">B.</label>
              <input id="answer-b-2" type="text" />
              <button type="button" aria-label="Delete answer B from question 2">
                <img src="asset/delete.svg" alt="" />
              </button>
            </div>

            <button class="link-action" type="button">
              <span>Add answer</span>
              <img src="asset/add_circle_white.svg" alt="" />
            </button>
          </article>
        }

        <button class="add-question-button" type="button" (click)="showNextQuestion()" [disabled]="isSecondQuestionVisible()">
          <span>Add next question</span>
          <img src="asset/add_circle_white.svg" alt="" />
        </button>
      </section>
    </form>

    <a class="publish-button" routerLink="/survey/3">Publish</a>
  </section>
</main>

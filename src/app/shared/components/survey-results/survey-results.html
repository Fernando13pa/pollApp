<aside class="result-panel" aria-labelledby="result-title">
  <div class="section-heading">
    <p class="eyebrow">Live result</p>
    <h2 id="result-title">Results</h2>
  </div>

  <div class="result-list">
    @for (option of resultOptions(); track option.label) {
      <article class="result-row">
        <div>
          <span>{{ option.label }}</span>
          <strong>{{ option.value }}%</strong>
        </div>
        <div class="result-track">
          <span [style.width.%]="option.value"></span>
        </div>
      </article>
    }
  </div>

  <div class="empty-result" aria-label="No result preview">
    <svg viewBox="0 0 120 82" aria-hidden="true">
      <path d="M18 65C27 43 38 38 52 44C67 50 72 25 89 19C99 15 108 18 114 26" />
      <path d="M15 66h90" />
      <circle cx="37" cy="28" r="8" />
    </svg>
    <p>No-result state is prepared for surveys without votes.</p>
  </div>
</aside>
